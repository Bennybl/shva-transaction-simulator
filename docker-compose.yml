services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Shva_Local_Dev_Pa55!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'Shva_Local_Dev_Pa55!' -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: ./server
      dockerfile: Shva.TransactionSimulator.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=db;Database=ShvaTransactionSimulator;User Id=sa;Password=Shva_Local_Dev_Pa55!;TrustServerCertificate=True"
      Jwt__Key: "docker-compose-signing-key-change-me-0123456789"
      Jwt__Issuer: "ShvaTransactionSimulator"
      Jwt__Audience: "ShvaTransactionSimulatorClient"
      Cors__AllowedOrigins__0: "http://localhost:8080"
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  sqlserver-data:
